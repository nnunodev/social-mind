version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: social-mind-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/social_mind.db
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE=10485760
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=["https://social.voidnode.dev","http://localhost:3000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: social-mind-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000/api

networks:
  default:
    driver: bridge
